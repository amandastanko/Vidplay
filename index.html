<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/dark/main.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #viewDiv {
      position: absolute;
      width: 400px;
      height: 400px;
      left: 0; top: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    #videoPlayerDiv { flex: 1; overflow: hidden; }

    #statusOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #statusOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .status-content { text-align: center; max-width: 400px; padding: 20px; }

    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-content p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      line-height: 1.6;
    }

    #debugLog {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      padding: 10px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #aaa;
      z-index: 9999;
      border-top: 1px solid rgba(79, 195, 247, 0.3);
    }

    #debugLog .log-ok { color: #66bb6a; }
    #debugLog .log-warn { color: #ffa726; }
    #debugLog .log-err { color: #ef5350; }
    #debugLog .log-info { color: #4fc3f7; }
  </style>
</head>
<body>

  <div id="viewDiv"></div>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>
    <div id="videoPlayerDiv"></div>

    <div id="statusOverlay">
      <div class="status-content">
        <div class="loading-spinner"></div>
        <p id="statusMessage">Initializing&hellip;</p>
      </div>
    </div>
  </div>

  <div id="debugLog"></div>

  <script type="module">
    // ── Debug logger ──
    const logEl = document.getElementById("debugLog");
    function log(msg, type = "info") {
      const span = document.createElement("div");
      span.className = "log-" + type;
      span.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
      console.log("[VideoPlayer]", msg);
    }

    const statusMsg = document.getElementById("statusMessage");
    const overlay = document.getElementById("statusOverlay");

    log("Starting imports…");

    import("https://js.arcgis.com/4.32/@arcgis/core/config.js").then(m => m.default).then(async (esriConfig) => {

      const { default: IdentityManager } = await import("https://js.arcgis.com/4.32/@arcgis/core/identity/IdentityManager.js");
      const { default: ServerInfo } = await import("https://js.arcgis.com/4.32/@arcgis/core/identity/ServerInfo.js");
      const { default: Map } = await import("https://js.arcgis.com/4.32/@arcgis/core/Map.js");
      const { default: MapView } = await import("https://js.arcgis.com/4.32/@arcgis/core/views/MapView.js");
      const { default: VideoLayer } = await import("https://js.arcgis.com/4.32/@arcgis/core/layers/VideoLayer.js");
      const { default: VideoPlayer } = await import("https://js.arcgis.com/4.32/@arcgis/core/widgets/VideoPlayer.js");

      log("All modules imported", "ok");

      // ── Auth ──
      const videoServerUrl = "https://geoxc-ecs-video.esri.com/server";

      const serverInfo = new ServerInfo({
        server: videoServerUrl,
        hasServer: true
      });
      IdentityManager.registerServers([serverInfo]);

      log("Requesting credentials for Video Server…", "info");
      statusMsg.textContent = "Signing in…";

      try {
        const credential = await IdentityManager.getCredential(videoServerUrl + "/rest/services");
        log("Authenticated! Token: " + credential.token.substring(0, 20) + "…", "ok");
      } catch (err) {
        log("Auth failed or dismissed: " + err.message, "warn");
      }

      // ── Create layers ──
      log("Creating VideoLayer (Collaboration)…", "info");
      statusMsg.textContent = "Loading video feeds…";

      const collaborationLayer = new VideoLayer({
        url: "https://geoxc-ecs-video.esri.com/server/rest/services/Collaboration_Table/VideoServer",
        title: "Collaboration Table Video",
        autoplay: true
      });

      const droneLayer = new VideoLayer({
        url: "https://geoxc-ecs-video.esri.com/server/rest/services/Drone_Table/VideoServer",
        title: "Drone Table Video",
        autoplay: true
      });

      log("VideoLayers created. Loading map…", "info");

      // ── Map & View ──
      const map = new Map({
        basemap: "dark-gray-vector",
        layers: [collaborationLayer]
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        zoom: 3,
        center: [0, 0],
        ui: { components: [] }
      });

      // ── Step-by-step init with timeouts ──
      log("Waiting for MapView…", "info");
      statusMsg.textContent = "Initializing map view…";

      try {
        await Promise.race([
          view.when(),
          new Promise((_, reject) => setTimeout(() => reject(new Error("MapView timed out after 15s")), 15000))
        ]);
        log("MapView ready. Size: " + view.width + "x" + view.height, "ok");
      } catch (e) {
        log("MapView error: " + e.message, "err");
      }

      log("Waiting for Collaboration VideoLayer…", "info");
      statusMsg.textContent = "Loading Collaboration video…";

      try {
        await Promise.race([
          collaborationLayer.when(),
          new Promise((_, reject) => setTimeout(() => reject(new Error("VideoLayer timed out after 20s")), 20000))
        ]);
        log("Collaboration layer loaded!", "ok");
        log("  Type: " + collaborationLayer.type, "info");
        log("  Duration: " + collaborationLayer.duration, "info");
        log("  Extent: " + JSON.stringify(collaborationLayer.fullExtent?.toJSON()), "info");
        log("  Load status: " + collaborationLayer.loadStatus, "info");
      } catch (e) {
        log("Collaboration layer error: " + e.message, "err");

        // Try to get more detail
        if (collaborationLayer.loadError) {
          log("  Load error detail: " + JSON.stringify(collaborationLayer.loadError), "err");
        }
        log("  Load status: " + collaborationLayer.loadStatus, "warn");
      }

      // ── Zoom to extent ──
      if (collaborationLayer.fullExtent) {
        log("Zooming to layer extent…", "info");
        try {
          await view.goTo(collaborationLayer.fullExtent.expand(1.5));
          log("View extent updated", "ok");
        } catch (e) {
          log("goTo error: " + e.message, "warn");
        }
      } else {
        log("No fullExtent on layer — skipping goTo", "warn");
      }

      // ── Create VideoPlayer ──
      log("Creating VideoPlayer widget…", "info");
      statusMsg.textContent = "Starting video player…";

      try {
        const videoPlayer = new VideoPlayer({
          layer: collaborationLayer,
          view: view,
          container: "videoPlayerDiv"
        });

        log("VideoPlayer created!", "ok");
        overlay.classList.add("hidden");

        // ── Feed switching ──
        let activeFeed = "collaboration";

        function getLayer(key) {
          return key === "collaboration" ? collaborationLayer : droneLayer;
        }

        async function switchFeed(key) {
          if (key === activeFeed) return;
          log("Switching to: " + key, "info");

          const oldLayer = getLayer(activeFeed);
          const newLayer = getLayer(key);

          map.remove(oldLayer);
          map.add(newLayer);

          try {
            await newLayer.when();
            log(key + " layer loaded", "ok");
          } catch (e) {
            log(key + " layer failed: " + e.message, "err");
          }

          videoPlayer.layer = newLayer;

          if (newLayer.fullExtent) {
            view.goTo(newLayer.fullExtent.expand(1.5));
          }

          activeFeed = key;
          document.querySelectorAll(".feed-btn").forEach(function (btn) {
            btn.classList.toggle("active", btn.getAttribute("data-feed") === key);
          });
        }

        document.querySelectorAll(".feed-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            switchFeed(this.getAttribute("data-feed"));
          });
        });

      } catch (e) {
        log("VideoPlayer creation failed: " + e.message, "err");
        document.querySelector(".loading-spinner").style.display = "none";
        statusMsg.textContent = "Video player failed to initialize.";
      }

    }).catch(err => {
      log("Fatal import error: " + err.message, "err");
      console.error(err);
    });
  </script>

</body>
</html>
