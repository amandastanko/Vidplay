<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    #videoContainer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #videoPlayer {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Auth screen */
    #authScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #authScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
    }

    .auth-card h2 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .auth-card a { color: #4fc3f7; text-decoration: none; }
    .auth-card a:hover { text-decoration: underline; }

    .auth-card ol {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      line-height: 1.8;
      margin: 0 0 20px 20px;
    }

    .auth-card ol code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #tokenInput {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
    }

    #tokenInput:focus { border-color: rgba(79, 195, 247, 0.5); }
    #tokenInput::placeholder { color: rgba(255, 255, 255, 0.2); }

    #connectBtn {
      width: 100%;
      padding: 11px;
      background: rgba(79, 195, 247, 0.15);
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 8px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #connectBtn:hover { background: rgba(79, 195, 247, 0.25); }
    #connectBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #authError {
      color: #ef5350;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    #debugLog {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 160px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.9);
      padding: 10px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #aaa;
      z-index: 9999;
      border-top: 1px solid rgba(79, 195, 247, 0.3);
    }

    #debugLog .log-ok { color: #66bb6a; }
    #debugLog .log-warn { color: #ffa726; }
    #debugLog .log-err { color: #ef5350; }
    #debugLog .log-info { color: #4fc3f7; }
  </style>
</head>
<body>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>

    <div id="videoContainer">
      <video id="videoPlayer" controls autoplay muted playsinline></video>
    </div>

    <div id="authScreen">
      <div class="auth-card">
        <h2>Connect to Video Server</h2>
        <p>This app requires a token from the GeoXC Enterprise portal.</p>
        <ol>
          <li>Open the <a href="https://geoxc-ecs.esri.com/portal/sharing/rest/generateToken" target="_blank">Token Generator</a></li>
          <li>Sign in with your portal credentials</li>
          <li>Set <strong>Webapp URL</strong> to: <code>https://amandastanko.github.io</code></li>
          <li>Click <strong>Generate Token</strong></li>
          <li>Copy and paste the token below</li>
        </ol>
        <input type="text" id="tokenInput" placeholder="Paste your token here…" autocomplete="off" />
        <button id="connectBtn">Connect</button>
        <p id="authError"></p>
      </div>
    </div>
  </div>

  <div id="debugLog"></div>

  <script>
    var logEl = document.getElementById("debugLog");
    function log(msg, type) {
      type = type || "info";
      var div = document.createElement("div");
      div.className = "log-" + type;
      div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      console.log("[VP]", msg);
    }

    var VIDEO_SERVER = "https://geoxc-ecs-video.esri.com/server/rest/services";

    var feeds = {
      collaboration: { service: "Collaboration_Table/VideoServer", label: "Collaboration Table" },
      drone: { service: "Drone_Table/VideoServer", label: "Drone Table" }
    };

    var currentToken = null;
    var currentHls = null;
    var activeFeed = "collaboration";

    var authScreen = document.getElementById("authScreen");
    var tokenInput = document.getElementById("tokenInput");
    var connectBtn = document.getElementById("connectBtn");
    var authError = document.getElementById("authError");
    var videoEl = document.getElementById("videoPlayer");

    connectBtn.addEventListener("click", handleConnect);
    tokenInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleConnect();
    });

    async function handleConnect() {
      var token = tokenInput.value.trim();
      if (!token) { showError("Please paste a token."); return; }

      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      authError.style.display = "none";

      log("Testing token…");

      try {
        var metaUrl = VIDEO_SERVER + "/" + feeds.collaboration.service + "?f=json&token=" + token;
        var resp = await fetch(metaUrl);
        var data = await resp.json();
        if (data.error) throw new Error(data.error.message || "Token rejected");

        log("Token valid! Service: " + data.serviceName, "ok");
        currentToken = token;
        authScreen.classList.add("hidden");
        await loadFeed("collaboration");

      } catch (err) {
        log("Failed: " + err.message, "err");
        showError("Failed: " + err.message);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    async function loadFeed(feedKey) {
      var feed = feeds[feedKey];
      var baseUrl = VIDEO_SERVER + "/" + feed.service;
      log("Loading feed: " + feed.label);

      try {
        // Get layer 0 metadata
        var layerUrl = baseUrl + "/0?f=json&token=" + currentToken;
        var layerResp = await fetch(layerUrl);
        var layerData = await layerResp.json();

        log("Layer type: " + layerData.serviceType, "info");
        log("Active: " + (layerData.livestreamInfo ? layerData.livestreamInfo.active : "n/a"), "info");

        // Extract the HLS URL from connectionUrl.hls
        var hlsUrl = null;

        if (layerData.connectionUrl) {
          log("connectionUrl found: " + JSON.stringify(layerData.connectionUrl), "ok");

          if (typeof layerData.connectionUrl === "string") {
            hlsUrl = layerData.connectionUrl;
          } else if (typeof layerData.connectionUrl === "object") {
            // connectionUrl is an object — look for hls, hlsUrl, or url properties
            hlsUrl = layerData.connectionUrl.hls
                  || layerData.connectionUrl.hlsUrl
                  || layerData.connectionUrl.url
                  || null;
          }
        }

        // Fallback: construct the known URL pattern
        if (!hlsUrl) {
          hlsUrl = baseUrl + "/0/content/ABR.m3u8";
          log("No connectionUrl found — using default pattern: " + hlsUrl, "warn");
        }

        log("HLS URL: " + hlsUrl, "ok");

        // Append token
        var tokenSep = hlsUrl.indexOf("?") > -1 ? "&" : "?";
        var fullUrl = hlsUrl + tokenSep + "token=" + currentToken;

        log("Playing stream…", "ok");
        playHls(fullUrl);

      } catch (err) {
        log("loadFeed error: " + err.message, "err");
      }
    }

    function playHls(url) {
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }

      if (Hls.isSupported()) {
        var hls = new Hls({
          debug: false,
          enableWorker: true,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6,
          xhrSetup: function (xhr, reqUrl) {
            // Ensure token is on every segment/manifest request
            if (reqUrl.indexOf("token=") === -1 && currentToken) {
              var sep = reqUrl.indexOf("?") > -1 ? "&" : "?";
              xhr.open("GET", reqUrl + sep + "token=" + currentToken, true);
            }
          }
        });

        hls.loadSource(url);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
          log("HLS manifest parsed! Levels: " + data.levels.length, "ok");
          videoEl.play().catch(function (e) {
            log("Autoplay blocked — click play: " + e.message, "warn");
          });
        });

        hls.on(Hls.Events.LEVEL_LOADED, function (event, data) {
          log("Level loaded. Live: " + data.details.live + " | Fragments: " + data.details.fragments.length, "ok");
        });

        hls.on(Hls.Events.FRAG_LOADED, function (event, data) {
          log("Fragment loaded: " + data.frag.sn, "ok");
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          log("HLS error: " + data.type + " / " + data.details, "err");
          if (data.response) {
            log("  HTTP status: " + data.response.code, "err");
          }
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              log("Fatal network error — retrying…", "warn");
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              log("Fatal media error — recovering…", "warn");
              hls.recoverMediaError();
            } else {
              log("Fatal error — cannot recover", "err");
            }
          }
        });

        currentHls = hls;

      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        videoEl.src = url;
        videoEl.addEventListener("loadedmetadata", function () { videoEl.play(); });
        log("Using native HLS (Safari)", "info");
      } else {
        log("HLS not supported in this browser", "err");
      }
    }

    // Feed switching
    document.querySelectorAll(".feed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var key = this.getAttribute("data-feed");
        if (key === activeFeed) return;
        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-feed") === key);
        });
        loadFeed(key);
      });
    });
  </script>

</body>
</html>
