<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/dark/main.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    /* Hidden map — real dimensions so MapView initializes fully */
    #viewDiv {
      position: absolute;
      width: 400px;
      height: 400px;
      left: 0; top: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Feed switcher ── */
    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    /* ── Video player ── */
    #videoPlayerDiv { flex: 1; overflow: hidden; }

    /* ── Loading / status overlay ── */
    #statusOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #statusOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .status-content { text-align: center; max-width: 360px; padding: 20px; }

    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-content p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      line-height: 1.6;
    }

    .status-content a {
      color: #4fc3f7;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div id="viewDiv"></div>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>
    <div id="videoPlayerDiv"></div>

    <div id="statusOverlay">
      <div class="status-content">
        <div class="loading-spinner"></div>
        <p id="statusMessage">Signing in&hellip;</p>
      </div>
    </div>
  </div>

  <script type="module">
    import esriConfig from "https://js.arcgis.com/4.32/@arcgis/core/config.js";
    import IdentityManager from "https://js.arcgis.com/4.32/@arcgis/core/identity/IdentityManager.js";
    import ServerInfo from "https://js.arcgis.com/4.32/@arcgis/core/identity/ServerInfo.js";
    import Map from "https://js.arcgis.com/4.32/@arcgis/core/Map.js";
    import MapView from "https://js.arcgis.com/4.32/@arcgis/core/views/MapView.js";
    import VideoLayer from "https://js.arcgis.com/4.32/@arcgis/core/layers/VideoLayer.js";
    import VideoPlayer from "https://js.arcgis.com/4.32/@arcgis/core/widgets/VideoPlayer.js";

    const statusMsg = document.getElementById("statusMessage");
    const overlay = document.getElementById("statusOverlay");

    // ──────────────────────────────────────────────
    // Authentication
    // The VideoServer sits on an ArcGIS Enterprise
    // portal — register the server so the Identity
    // Manager knows to prompt for credentials.
    // ──────────────────────────────────────────────
    const videoServerUrl = "https://geoxc-ecs-video.esri.com/server";

    const serverInfo = new ServerInfo({
      server: videoServerUrl,
      hasServer: true
    });

    IdentityManager.registerServers([serverInfo]);

    // This will trigger the sign-in popup for the Enterprise server.
    // Once the user signs in, the token is cached for subsequent requests.
    try {
      statusMsg.textContent = "Signing in to Video Server…";
      await IdentityManager.getCredential(videoServerUrl + "/rest/services");
    } catch (err) {
      console.warn("Authentication skipped or failed:", err);
      // Continue anyway — the service may be public or token may already exist
    }

    // ── Video layers ──
    statusMsg.textContent = "Loading video feeds…";

    const collaborationLayer = new VideoLayer({
      url: "https://geoxc-ecs-video.esri.com/server/rest/services/Collaboration_Table/VideoServer",
      title: "Collaboration Table Video",
      autoplay: true
    });

    const droneLayer = new VideoLayer({
      url: "https://geoxc-ecs-video.esri.com/server/rest/services/Drone_Table/VideoServer",
      title: "Drone Table Video",
      autoplay: true
    });

    // ── Hidden map & view ──
    const map = new Map({
      basemap: "dark-gray-vector",
      layers: [collaborationLayer]
    });

    const view = new MapView({
      container: "viewDiv",
      map: map,
      zoom: 3,
      center: [0, 0],
      ui: { components: [] }
    });

    // ── Wait for everything to be ready ──
    try {
      await view.when();
      await collaborationLayer.when();

      if (collaborationLayer.fullExtent) {
        await view.goTo(collaborationLayer.fullExtent.expand(1.5));
      }

      const videoPlayer = new VideoPlayer({
        layer: collaborationLayer,
        view: view,
        container: "videoPlayerDiv"
      });

      overlay.classList.add("hidden");

      // ── Feed switching ──
      let activeFeed = "collaboration";

      function getLayer(key) {
        return key === "collaboration" ? collaborationLayer : droneLayer;
      }

      async function switchFeed(key) {
        if (key === activeFeed) return;

        const oldLayer = getLayer(activeFeed);
        const newLayer = getLayer(key);

        map.remove(oldLayer);
        map.add(newLayer);

        await newLayer.when();
        videoPlayer.layer = newLayer;

        if (newLayer.fullExtent) {
          view.goTo(newLayer.fullExtent.expand(1.5));
        }

        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-feed") === key);
        });
      }

      document.querySelectorAll(".feed-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          switchFeed(this.getAttribute("data-feed"));
        });
      });

    } catch (error) {
      console.error("Failed to initialize:", error);
      document.querySelector(".loading-spinner").style.display = "none";
      statusMsg.innerHTML =
        "Unable to load video feed.<br>Check that you have access to the Video Server " +
        "and try <a href=\"javascript:location.reload()\">reloading</a>.";
    }
  </script>

</body>
</html>
