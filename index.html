<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    /* Hidden map — required by the API but not displayed */
    #viewDiv {
      position: absolute;
      width: 1px;
      height: 1px;
      left: -9999px;
      overflow: hidden;
    }

    /* ── Visible UI ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Feed switcher ── */
    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons {
      display: flex;
      gap: 8px;
    }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block;
      font-size: 10px;
      opacity: 0.6;
    }

    /* ── Video player fills remaining space ── */
    #videoPlayerDiv {
      flex: 1;
      overflow: hidden;
    }

    /* ── Loading state ── */
    #loadingOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content { text-align: center; }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-content p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Hidden map (required by VideoPlayer API) -->
  <div id="viewDiv"></div>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>
    <div id="videoPlayerDiv"></div>

    <div id="loadingOverlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>Loading video feed&hellip;</p>
      </div>
    </div>
  </div>

  <script type="module">
    import Map from "https://js.arcgis.com/4.31/@arcgis/core/Map.js";
    import MapView from "https://js.arcgis.com/4.31/@arcgis/core/views/MapView.js";
    import VideoLayer from "https://js.arcgis.com/4.31/@arcgis/core/layers/VideoLayer.js";
    import VideoPlayer from "https://js.arcgis.com/4.31/@arcgis/core/widgets/VideoPlayer.js";

    // ── Two video feeds ──
    const collaborationLayer = new VideoLayer({
      url: "https://geoxc-ecs-video.esri.com/server/rest/services/Collaboration_Table/VideoServer",
      title: "Collaboration Table Video",
      autoplay: true
    });

    const droneLayer = new VideoLayer({
      url: "https://geoxc-ecs-video.esri.com/server/rest/services/Drone_Table/VideoServer",
      title: "Drone Table Video",
      autoplay: true
    });

    // ── Hidden map & view (required by VideoPlayer) ──
    const map = new Map({
      basemap: "dark-gray-vector",
      layers: [collaborationLayer]
    });

    const view = new MapView({
      container: "viewDiv",
      map: map,
      zoom: 3,
      center: [0, 0],
      ui: { components: [] }
    });

    // ── Video Player ──
    const videoPlayer = new VideoPlayer({
      layer: collaborationLayer,
      view: view,
      container: "videoPlayerDiv"
    });

    // ── Feed switching ──
    let activeFeed = "collaboration";

    function getLayer(feedKey) {
      return feedKey === "collaboration" ? collaborationLayer : droneLayer;
    }

    function switchFeed(feedKey) {
      if (feedKey === activeFeed) return;

      const oldLayer = getLayer(activeFeed);
      const newLayer = getLayer(feedKey);

      map.remove(oldLayer);
      map.add(newLayer);
      videoPlayer.layer = newLayer;

      activeFeed = feedKey;
      document.querySelectorAll(".feed-btn").forEach(function (btn) {
        btn.classList.toggle("active", btn.getAttribute("data-feed") === feedKey);
      });
    }

    document.querySelectorAll(".feed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        switchFeed(this.getAttribute("data-feed"));
      });
    });

    // ── Initial load ──
    collaborationLayer.when(function () {
      document.getElementById("loadingOverlay").classList.add("hidden");
    }).catch(function (error) {
      console.error("Video layer failed to load:", error);
      document.querySelector(".loading-content p").textContent =
        "Unable to load video feed. Check the service URL.";
    });
  </script>

</body>
</html>
