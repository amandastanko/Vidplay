<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/dark/main.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #viewDiv {
      position: absolute;
      width: 400px;
      height: 400px;
      left: 0; top: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Feed switcher ── */
    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    #videoPlayerDiv { flex: 1; overflow: hidden; }

    /* ── Auth screen ── */
    #authScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #authScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
    }

    .auth-card h2 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .auth-card a {
      color: #4fc3f7;
      text-decoration: none;
    }

    .auth-card a:hover {
      text-decoration: underline;
    }

    .auth-card ol {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      line-height: 1.8;
      margin: 0 0 20px 20px;
    }

    .auth-card ol code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #tokenInput {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #tokenInput:focus {
      border-color: rgba(79, 195, 247, 0.5);
    }

    #tokenInput::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    #connectBtn {
      width: 100%;
      padding: 11px;
      background: rgba(79, 195, 247, 0.15);
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 8px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #connectBtn:hover {
      background: rgba(79, 195, 247, 0.25);
    }

    #connectBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #authError {
      color: #ef5350;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* ── Loading overlay ── */
    #loadingOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content { text-align: center; }

    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-content p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="viewDiv"></div>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>
    <div id="videoPlayerDiv"></div>

    <!-- Auth screen -->
    <div id="authScreen">
      <div class="auth-card">
        <h2>Connect to Video Server</h2>
        <p>This app requires a token from the GeoXC Enterprise portal.</p>
        <ol>
          <li>Open the <a href="https://geoxc-ecs.esri.com/portal/sharing/rest/generateToken" target="_blank">Token Generator</a></li>
          <li>Sign in with your portal credentials</li>
          <li>Set <strong>Webapp URL</strong> to: <code>https://amandastanko.github.io</code></li>
          <li>Click <strong>Generate Token</strong></li>
          <li>Copy and paste the token below</li>
        </ol>
        <input type="text" id="tokenInput" placeholder="Paste your token here…" autocomplete="off" />
        <button id="connectBtn">Connect</button>
        <p id="authError"></p>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="hidden">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p id="statusMessage">Loading video feeds…</p>
      </div>
    </div>
  </div>

  <script type="module">
    const { default: esriConfig } = await import("https://js.arcgis.com/4.32/@arcgis/core/config.js");
    const { default: IdentityManager } = await import("https://js.arcgis.com/4.32/@arcgis/core/identity/IdentityManager.js");
    const { default: Credential } = await import("https://js.arcgis.com/4.32/@arcgis/core/identity/Credential.js");
    const { default: Map } = await import("https://js.arcgis.com/4.32/@arcgis/core/Map.js");
    const { default: MapView } = await import("https://js.arcgis.com/4.32/@arcgis/core/views/MapView.js");
    const { default: VideoLayer } = await import("https://js.arcgis.com/4.32/@arcgis/core/layers/VideoLayer.js");
    const { default: VideoPlayer } = await import("https://js.arcgis.com/4.32/@arcgis/core/widgets/VideoPlayer.js");

    const portalUrl = "https://geoxc-ecs.esri.com/portal";
    const videoServerUrl = "https://geoxc-ecs-video.esri.com/server";

    esriConfig.portalUrl = portalUrl;

    // ── UI references ──
    const authScreen = document.getElementById("authScreen");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const statusMsg = document.getElementById("statusMessage");
    const tokenInput = document.getElementById("tokenInput");
    const connectBtn = document.getElementById("connectBtn");
    const authError = document.getElementById("authError");

    // ── Connect button handler ──
    connectBtn.addEventListener("click", handleConnect);
    tokenInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleConnect();
    });

    async function handleConnect() {
      const token = tokenInput.value.trim();
      if (!token) {
        showError("Please paste a token.");
        return;
      }

      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      authError.style.display = "none";

      try {
        // Register the token for both the portal and the video server
        const portalCredential = new Credential({
          userId: "user",
          server: portalUrl + "/sharing/rest",
          token: token
        });

        const videoCredential = new Credential({
          userId: "user",
          server: videoServerUrl + "/rest/services",
          token: token
        });

        IdentityManager.registerToken(portalCredential.toJSON());
        IdentityManager.registerToken(videoCredential.toJSON());

        // Quick test: try to fetch the video service metadata
        const testUrl = videoServerUrl + "/rest/services/Collaboration_Table/VideoServer?f=json&token=" + token;
        const resp = await fetch(testUrl);
        const data = await resp.json();

        if (data.error) {
          throw new Error(data.error.message || "Token rejected by Video Server");
        }

        console.log("Video service metadata:", data);

        // Token works — proceed to load the player
        authScreen.classList.add("hidden");
        loadingOverlay.classList.remove("hidden");
        await initPlayer();

      } catch (err) {
        console.error("Connection error:", err);
        showError("Failed: " + err.message);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    // ── Initialize the video player ──
    async function initPlayer() {
      statusMsg.textContent = "Loading Collaboration video…";

      const collaborationLayer = new VideoLayer({
        url: videoServerUrl + "/rest/services/Collaboration_Table/VideoServer",
        title: "Collaboration Table Video",
        autoplay: true
      });

      const droneLayer = new VideoLayer({
        url: videoServerUrl + "/rest/services/Drone_Table/VideoServer",
        title: "Drone Table Video",
        autoplay: true
      });

      const map = new Map({
        basemap: "dark-gray-vector",
        layers: [collaborationLayer]
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        zoom: 3,
        center: [0, 0],
        ui: { components: [] }
      });

      await view.when();

      try {
        await collaborationLayer.when();
        console.log("Layer loaded. Duration:", collaborationLayer.duration);

        if (collaborationLayer.fullExtent) {
          await view.goTo(collaborationLayer.fullExtent.expand(1.5));
        }
      } catch (e) {
        console.error("Layer load error:", e);
        statusMsg.textContent = "Video layer failed to load.";
        return;
      }

      statusMsg.textContent = "Starting player…";

      const videoPlayer = new VideoPlayer({
        layer: collaborationLayer,
        view: view,
        container: "videoPlayerDiv"
      });

      loadingOverlay.classList.add("hidden");

      // ── Feed switching ──
      let activeFeed = "collaboration";

      function getLayer(key) {
        return key === "collaboration" ? collaborationLayer : droneLayer;
      }

      async function switchFeed(key) {
        if (key === activeFeed) return;

        const oldLayer = getLayer(activeFeed);
        const newLayer = getLayer(key);

        map.remove(oldLayer);
        map.add(newLayer);

        try {
          await newLayer.when();
        } catch (e) {
          console.error("Layer switch error:", e);
        }

        videoPlayer.layer = newLayer;

        if (newLayer.fullExtent) {
          view.goTo(newLayer.fullExtent.expand(1.5));
        }

        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.getAttribute("data-feed") === key);
        });
      }

      document.querySelectorAll(".feed-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          switchFeed(this.getAttribute("data-feed"));
        });
      });
    }
  </script>

</body>
</html>
