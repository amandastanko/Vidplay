<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Feed switcher ── */
    #feedSwitcher {
      padding: 10px 14px;
      background: #0f0f1a;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.45);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.75);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.10);
      border-color: rgba(79, 195, 247, 0.45);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.55;
    }

    /* ── Video container ── */
    #videoContainer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      position: relative;
    }

    #videoPlayer {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Live badge ── */
    #liveBadge {
      position: absolute;
      top: 14px;
      left: 14px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #ef5350;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #liveBadge.visible { display: flex; }

    #liveBadge .live-dot {
      width: 7px;
      height: 7px;
      background: #ef5350;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Auth screen ── */
    #authScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a14;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #authScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-card {
      background: #13132a;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 36px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .auth-card h2 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      margin-bottom: 22px;
    }

    .auth-card p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .auth-card a { color: #4fc3f7; text-decoration: none; }
    .auth-card a:hover { text-decoration: underline; }

    .auth-card ol {
      color: rgba(255, 255, 255, 0.45);
      font-size: 12px;
      line-height: 2;
      margin: 0 0 22px 20px;
    }

    .auth-card ol code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 7px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.65);
    }

    #tokenInput {
      width: 100%;
      padding: 11px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    #tokenInput:focus { border-color: rgba(79, 195, 247, 0.5); }
    #tokenInput::placeholder { color: rgba(255, 255, 255, 0.15); }

    #connectBtn {
      width: 100%;
      padding: 11px;
      background: rgba(79, 195, 247, 0.12);
      border: 1px solid rgba(79, 195, 247, 0.35);
      border-radius: 8px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #connectBtn:hover { background: rgba(79, 195, 247, 0.22); }
    #connectBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #authError {
      color: #ef5350;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }

    /* ── Loading spinner (inside video area) ── */
    #videoLoading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #videoLoading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .vid-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>

    <div id="videoContainer">
      <video id="videoPlayer" controls autoplay muted playsinline></video>
      <div id="liveBadge"><span class="live-dot"></span> Live</div>
      <div id="videoLoading" class="hidden"><div class="vid-spinner"></div></div>
    </div>

    <div id="authScreen">
      <div class="auth-card">
        <h2>Video Server</h2>
        <div class="subtitle">GeoXC Enterprise Portal</div>
        <p>Generate a token to connect to the livestream feeds.</p>
        <ol>
          <li>Open the <a href="https://geoxc-ecs.esri.com/portal/sharing/rest/generateToken" target="_blank">Token Generator</a></li>
          <li>Sign in with your portal credentials</li>
          <li>Set Webapp URL to <code>https://amandastanko.github.io</code></li>
          <li>Copy the generated token</li>
        </ol>
        <input type="text" id="tokenInput" placeholder="Paste token here…" autocomplete="off" />
        <button id="connectBtn">Connect</button>
        <p id="authError"></p>
      </div>
    </div>
  </div>

  <script>
    var VIDEO_SERVER = "https://geoxc-ecs-video.esri.com/server/rest/services";

    var feeds = {
      collaboration: { service: "Collaboration_Table/VideoServer", label: "Collaboration Table" },
      drone: { service: "Drone_Table/VideoServer", label: "Drone Table" }
    };

    var currentToken = null;
    var currentHls = null;
    var activeFeed = "collaboration";

    var authScreen = document.getElementById("authScreen");
    var tokenInput = document.getElementById("tokenInput");
    var connectBtn = document.getElementById("connectBtn");
    var authError = document.getElementById("authError");
    var videoEl = document.getElementById("videoPlayer");
    var liveBadge = document.getElementById("liveBadge");
    var videoLoading = document.getElementById("videoLoading");

    connectBtn.addEventListener("click", handleConnect);
    tokenInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleConnect();
    });

    async function handleConnect() {
      var token = tokenInput.value.trim();
      if (!token) { showError("Please paste a token."); return; }

      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      authError.style.display = "none";

      try {
        var metaUrl = VIDEO_SERVER + "/" + feeds.collaboration.service + "?f=json&token=" + token;
        var resp = await fetch(metaUrl);
        var data = await resp.json();
        if (data.error) throw new Error(data.error.message || "Invalid token");

        currentToken = token;
        authScreen.classList.add("hidden");
        await loadFeed("collaboration");

      } catch (err) {
        showError(err.message);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    async function loadFeed(feedKey) {
      var feed = feeds[feedKey];
      var baseUrl = VIDEO_SERVER + "/" + feed.service;

      videoLoading.classList.remove("hidden");
      liveBadge.classList.remove("visible");

      try {
        var layerResp = await fetch(baseUrl + "/0?f=json&token=" + currentToken);
        var layerData = await layerResp.json();

        // Extract HLS URL from connectionUrl.hls
        var hlsUrl = null;

        if (layerData.connectionUrl) {
          if (typeof layerData.connectionUrl === "string") {
            hlsUrl = layerData.connectionUrl;
          } else if (typeof layerData.connectionUrl === "object") {
            hlsUrl = layerData.connectionUrl.hls
                  || layerData.connectionUrl.hlsUrl
                  || layerData.connectionUrl.url
                  || null;
          }
        }

        // Fallback pattern
        if (!hlsUrl) {
          hlsUrl = baseUrl + "/0/content/ABR.m3u8";
        }

        var sep = hlsUrl.indexOf("?") > -1 ? "&" : "?";
        playHls(hlsUrl + sep + "token=" + currentToken);

      } catch (err) {
        videoLoading.classList.add("hidden");
        console.error("Feed load error:", err);
      }
    }

    function playHls(url) {
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }

      if (Hls.isSupported()) {
        var hls = new Hls({
          enableWorker: true,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6,
          xhrSetup: function (xhr, reqUrl) {
            if (reqUrl.indexOf("token=") === -1 && currentToken) {
              var sep = reqUrl.indexOf("?") > -1 ? "&" : "?";
              xhr.open("GET", reqUrl + sep + "token=" + currentToken, true);
            }
          }
        });

        hls.loadSource(url);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          videoLoading.classList.add("hidden");
          liveBadge.classList.add("visible");
          videoEl.play().catch(function () {});
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            }
          }
        });

        currentHls = hls;

      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        videoEl.src = url;
        videoEl.addEventListener("loadedmetadata", function () {
          videoLoading.classList.add("hidden");
          liveBadge.classList.add("visible");
          videoEl.play();
        });
      }
    }

    // Feed switching
    document.querySelectorAll(".feed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var key = this.getAttribute("data-feed");
        if (key === activeFeed) return;
        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-feed") === key);
        });
        loadFeed(key);
      });
    });
  </script>

</body>
</html>
