<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <!-- HLS.js for playing HLS streams in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ── Feed switcher ── */
    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    /* ── Video container ── */
    #videoContainer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #videoPlayer {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Auth screen ── */
    #authScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #authScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
    }

    .auth-card h2 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .auth-card a {
      color: #4fc3f7;
      text-decoration: none;
    }

    .auth-card a:hover { text-decoration: underline; }

    .auth-card ol {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      line-height: 1.8;
      margin: 0 0 20px 20px;
    }

    .auth-card ol code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #tokenInput {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    #tokenInput:focus { border-color: rgba(79, 195, 247, 0.5); }
    #tokenInput::placeholder { color: rgba(255, 255, 255, 0.2); }

    #connectBtn {
      width: 100%;
      padding: 11px;
      background: rgba(79, 195, 247, 0.15);
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 8px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #connectBtn:hover { background: rgba(79, 195, 247, 0.25); }
    #connectBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #authError {
      color: #ef5350;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* ── Debug log ── */
    #debugLog {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.9);
      padding: 10px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #aaa;
      z-index: 9999;
      border-top: 1px solid rgba(79, 195, 247, 0.3);
    }

    #debugLog .log-ok { color: #66bb6a; }
    #debugLog .log-warn { color: #ffa726; }
    #debugLog .log-err { color: #ef5350; }
    #debugLog .log-info { color: #4fc3f7; }
  </style>
</head>
<body>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>

    <div id="videoContainer">
      <video id="videoPlayer" controls autoplay muted></video>
    </div>

    <!-- Auth screen -->
    <div id="authScreen">
      <div class="auth-card">
        <h2>Connect to Video Server</h2>
        <p>This app requires a token from the GeoXC Enterprise portal.</p>
        <ol>
          <li>Open the <a href="https://geoxc-ecs.esri.com/portal/sharing/rest/generateToken" target="_blank">Token Generator</a></li>
          <li>Sign in with your portal credentials</li>
          <li>Set <strong>Webapp URL</strong> to: <code>https://amandastanko.github.io</code></li>
          <li>Click <strong>Generate Token</strong></li>
          <li>Copy and paste the token below</li>
        </ol>
        <input type="text" id="tokenInput" placeholder="Paste your token here…" autocomplete="off" />
        <button id="connectBtn">Connect</button>
        <p id="authError"></p>
      </div>
    </div>
  </div>

  <div id="debugLog"></div>

  <script>
    // ── Debug logger ──
    const logEl = document.getElementById("debugLog");
    function log(msg, type) {
      type = type || "info";
      const div = document.createElement("div");
      div.className = "log-" + type;
      div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      console.log("[VP]", msg);
    }

    // ── Config ──
    const VIDEO_SERVER = "https://geoxc-ecs-video.esri.com/server/rest/services";

    const feeds = {
      collaboration: {
        service: "Collaboration_Table/VideoServer",
        label: "Collaboration Table"
      },
      drone: {
        service: "Drone_Table/VideoServer",
        label: "Drone Table"
      }
    };

    let currentToken = null;
    let currentHls = null;
    let activeFeed = "collaboration";

    // ── UI refs ──
    const authScreen = document.getElementById("authScreen");
    const tokenInput = document.getElementById("tokenInput");
    const connectBtn = document.getElementById("connectBtn");
    const authError = document.getElementById("authError");
    const videoEl = document.getElementById("videoPlayer");

    // ── Auth ──
    connectBtn.addEventListener("click", handleConnect);
    tokenInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleConnect();
    });

    async function handleConnect() {
      var token = tokenInput.value.trim();
      if (!token) {
        showError("Please paste a token.");
        return;
      }

      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      authError.style.display = "none";

      log("Testing token against Video Server…");

      try {
        // Test: fetch service metadata with the token
        var metaUrl = VIDEO_SERVER + "/" + feeds.collaboration.service + "?f=json&token=" + token;
        log("Fetching: " + metaUrl);

        var resp = await fetch(metaUrl);
        var data = await resp.json();

        log("Response keys: " + Object.keys(data).join(", "), "info");

        if (data.error) {
          throw new Error(data.error.message || "Token rejected");
        }

        log("Service metadata received!", "ok");
        log("  Service name: " + (data.serviceName || data.name || "unknown"), "ok");

        // Check if there's a connection URL or HLS info
        if (data.connectionUrl) {
          log("  Connection URL: " + data.connectionUrl, "ok");
        }
        if (data.streamUrls) {
          log("  Stream URLs: " + JSON.stringify(data.streamUrls), "ok");
        }

        // Log full response for debugging
        log("  Full metadata: " + JSON.stringify(data).substring(0, 500), "info");

        currentToken = token;

        // Hide auth, try to load the video
        authScreen.classList.add("hidden");
        await loadFeed("collaboration");

      } catch (err) {
        log("Connection failed: " + err.message, "err");
        showError("Failed: " + err.message);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    // ── Load a video feed ──
    async function loadFeed(feedKey) {
      var feed = feeds[feedKey];
      log("Loading feed: " + feed.label);

      // Step 1: Get service info to find the stream/playback URL
      var serviceUrl = VIDEO_SERVER + "/" + feed.service;
      var infoUrl = serviceUrl + "?f=json&token=" + currentToken;

      try {
        var resp = await fetch(infoUrl);
        var info = await resp.json();

        log("Service info loaded for " + feed.label, "ok");

        // Step 2: Try to find the HLS/stream URL
        // VideoServer typically exposes a /stream or provides an HLS m3u8 URL
        var hlsUrl = null;

        // Check if the service directly provides a connection/stream URL
        if (info.connectionUrl) {
          hlsUrl = info.connectionUrl;
          log("Found connectionUrl: " + hlsUrl, "ok");
        }

        // Try the /stream endpoint
        if (!hlsUrl) {
          var streamUrl = serviceUrl + "/0/stream?f=json&token=" + currentToken;
          log("Trying /0/stream endpoint…");
          try {
            var streamResp = await fetch(streamUrl);
            var streamData = await streamResp.json();
            log("Stream response: " + JSON.stringify(streamData).substring(0, 300), "info");

            if (streamData.streamUrl) {
              hlsUrl = streamData.streamUrl;
            } else if (streamData.hlsUrl) {
              hlsUrl = streamData.hlsUrl;
            } else if (streamData.url) {
              hlsUrl = streamData.url;
            }
          } catch (e) {
            log("Stream endpoint error: " + e.message, "warn");
          }
        }

        // Try the /0/play endpoint
        if (!hlsUrl) {
          var playUrl = serviceUrl + "/0/play?f=json&token=" + currentToken;
          log("Trying /0/play endpoint…");
          try {
            var playResp = await fetch(playUrl);
            var playData = await playResp.json();
            log("Play response: " + JSON.stringify(playData).substring(0, 300), "info");

            if (playData.streamUrl) {
              hlsUrl = playData.streamUrl;
            } else if (playData.hlsUrl) {
              hlsUrl = playData.hlsUrl;
            } else if (playData.url) {
              hlsUrl = playData.url;
            }
          } catch (e) {
            log("Play endpoint error: " + e.message, "warn");
          }
        }

        // Try fetching the layer info at /0
        if (!hlsUrl) {
          var layerUrl = serviceUrl + "/0?f=json&token=" + currentToken;
          log("Trying /0 layer endpoint…");
          try {
            var layerResp = await fetch(layerUrl);
            var layerData = await layerResp.json();
            log("Layer 0 response: " + JSON.stringify(layerData).substring(0, 500), "info");

            // Look for any URL-like properties
            for (var key in layerData) {
              if (typeof layerData[key] === "string" && layerData[key].indexOf("http") === 0) {
                log("  Found URL property '" + key + "': " + layerData[key], "info");
              }
            }

            if (layerData.connectionUrl) hlsUrl = layerData.connectionUrl;
            if (layerData.streamUrl) hlsUrl = layerData.streamUrl;
            if (layerData.hlsUrl) hlsUrl = layerData.hlsUrl;
          } catch (e) {
            log("Layer 0 error: " + e.message, "warn");
          }
        }

        if (!hlsUrl) {
          log("Could not find HLS stream URL. Dumping service info for inspection:", "warn");
          log(JSON.stringify(info, null, 2), "warn");
          return;
        }

        // Append token if needed
        if (hlsUrl.indexOf("token=") === -1) {
          hlsUrl += (hlsUrl.indexOf("?") > -1 ? "&" : "?") + "token=" + currentToken;
        }

        log("Playing HLS stream: " + hlsUrl, "ok");
        playHls(hlsUrl);

      } catch (err) {
        log("loadFeed error: " + err.message, "err");
      }
    }

    // ── Play HLS stream ──
    function playHls(url) {
      // Destroy previous instance
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }

      if (Hls.isSupported()) {
        var hls = new Hls({
          debug: false,
          enableWorker: true,
          xhrSetup: function (xhr, url) {
            // Append token to segment requests if needed
            if (url.indexOf("token=") === -1 && currentToken) {
              var sep = url.indexOf("?") > -1 ? "&" : "?";
              xhr.open("GET", url + sep + "token=" + currentToken, true);
            }
          }
        });

        hls.loadSource(url);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          log("HLS manifest parsed — playing!", "ok");
          videoEl.play().catch(function (e) {
            log("Autoplay blocked: " + e.message + " (click play manually)", "warn");
          });
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          log("HLS error: " + data.type + " / " + data.details, "err");
          if (data.fatal) {
            log("Fatal HLS error. Type: " + data.type, "err");
          }
        });

        currentHls = hls;

      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        // Native HLS (Safari)
        videoEl.src = url;
        videoEl.addEventListener("loadedmetadata", function () {
          videoEl.play();
        });
      } else {
        log("HLS not supported in this browser", "err");
      }
    }

    // ── Feed switching ──
    document.querySelectorAll(".feed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var key = this.getAttribute("data-feed");
        if (key === activeFeed) return;

        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-feed") === key);
        });

        loadFeed(key);
      });
    });
  </script>

</body>
</html>
