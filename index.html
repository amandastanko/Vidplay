<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcGIS Video Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #feedSwitcher {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .feed-buttons { display: flex; gap: 8px; }

    .feed-btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.4;
    }

    .feed-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .feed-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.5);
      color: #4fc3f7;
    }

    .feed-btn .feed-label {
      display: block; font-weight: 600; font-size: 12px; margin-bottom: 1px;
    }

    .feed-btn .feed-desc {
      display: block; font-size: 10px; opacity: 0.6;
    }

    #videoContainer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #videoPlayer {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Auth screen */
    #authScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #authScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
    }

    .auth-card h2 {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .auth-card a { color: #4fc3f7; text-decoration: none; }
    .auth-card a:hover { text-decoration: underline; }

    .auth-card ol {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      line-height: 1.8;
      margin: 0 0 20px 20px;
    }

    .auth-card ol code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #tokenInput {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.8);
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
    }

    #tokenInput:focus { border-color: rgba(79, 195, 247, 0.5); }
    #tokenInput::placeholder { color: rgba(255, 255, 255, 0.2); }

    #connectBtn {
      width: 100%;
      padding: 11px;
      background: rgba(79, 195, 247, 0.15);
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 8px;
      color: #4fc3f7;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #connectBtn:hover { background: rgba(79, 195, 247, 0.25); }
    #connectBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #authError {
      color: #ef5350;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    #debugLog {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.9);
      padding: 10px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #aaa;
      z-index: 9999;
      border-top: 1px solid rgba(79, 195, 247, 0.3);
    }

    #debugLog .log-ok { color: #66bb6a; }
    #debugLog .log-warn { color: #ffa726; }
    #debugLog .log-err { color: #ef5350; }
    #debugLog .log-info { color: #4fc3f7; }
  </style>
</head>
<body>

  <div id="app">
    <div id="feedSwitcher">
      <div class="feed-buttons">
        <button class="feed-btn active" data-feed="collaboration">
          <span class="feed-label">Collaboration</span>
          <span class="feed-desc">Collaboration Table</span>
        </button>
        <button class="feed-btn" data-feed="drone">
          <span class="feed-label">Drone</span>
          <span class="feed-desc">Drone Table</span>
        </button>
      </div>
    </div>

    <div id="videoContainer">
      <video id="videoPlayer" controls autoplay muted playsinline></video>
    </div>

    <div id="authScreen">
      <div class="auth-card">
        <h2>Connect to Video Server</h2>
        <p>This app requires a token from the GeoXC Enterprise portal.</p>
        <ol>
          <li>Open the <a href="https://geoxc-ecs.esri.com/portal/sharing/rest/generateToken" target="_blank">Token Generator</a></li>
          <li>Sign in with your portal credentials</li>
          <li>Set <strong>Webapp URL</strong> to: <code>https://amandastanko.github.io</code></li>
          <li>Click <strong>Generate Token</strong></li>
          <li>Copy and paste the token below</li>
        </ol>
        <input type="text" id="tokenInput" placeholder="Paste your token here…" autocomplete="off" />
        <button id="connectBtn">Connect</button>
        <p id="authError"></p>
      </div>
    </div>
  </div>

  <div id="debugLog"></div>

  <script>
    var logEl = document.getElementById("debugLog");
    function log(msg, type) {
      type = type || "info";
      var div = document.createElement("div");
      div.className = "log-" + type;
      div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      console.log("[VP]", msg);
    }

    var VIDEO_SERVER = "https://geoxc-ecs-video.esri.com/server/rest/services";

    var feeds = {
      collaboration: { service: "Collaboration_Table/VideoServer", label: "Collaboration Table" },
      drone: { service: "Drone_Table/VideoServer", label: "Drone Table" }
    };

    var currentToken = null;
    var currentHls = null;
    var activeFeed = "collaboration";

    var authScreen = document.getElementById("authScreen");
    var tokenInput = document.getElementById("tokenInput");
    var connectBtn = document.getElementById("connectBtn");
    var authError = document.getElementById("authError");
    var videoEl = document.getElementById("videoPlayer");

    connectBtn.addEventListener("click", handleConnect);
    tokenInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleConnect();
    });

    async function handleConnect() {
      var token = tokenInput.value.trim();
      if (!token) { showError("Please paste a token."); return; }

      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      authError.style.display = "none";

      log("Testing token…");

      try {
        var metaUrl = VIDEO_SERVER + "/" + feeds.collaboration.service + "?f=json&token=" + token;
        var resp = await fetch(metaUrl);
        var data = await resp.json();

        if (data.error) throw new Error(data.error.message || "Token rejected");

        log("Token valid! Service: " + data.serviceName, "ok");
        currentToken = token;
        authScreen.classList.add("hidden");
        await loadFeed("collaboration");

      } catch (err) {
        log("Failed: " + err.message, "err");
        showError("Failed: " + err.message);
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    async function loadFeed(feedKey) {
      var feed = feeds[feedKey];
      var baseUrl = VIDEO_SERVER + "/" + feed.service;
      log("Loading feed: " + feed.label);

      try {
        // Get layer 0 info
        var layerUrl = baseUrl + "/0?f=json&token=" + currentToken;
        log("Fetching layer info: /0");
        var layerResp = await fetch(layerUrl);
        var layerData = await layerResp.json();

        log("Layer type: " + layerData.serviceType, "info");
        log("Codecs: " + JSON.stringify(layerData.codecs), "info");
        log("Container: " + (layerData.playbackInfo ? layerData.playbackInfo.containerFormat : "unknown"), "info");

        if (layerData.livestreamInfo) {
          log("Livestream active: " + layerData.livestreamInfo.active, "info");
          log("Buffer size: " + layerData.livestreamInfo.bufferSize, "info");
          if (layerData.livestreamInfo.sourceUrl) {
            log("Source URL: " + layerData.livestreamInfo.sourceUrl, "info");
          }
        }

        // Log ALL string properties to find URLs
        log("Scanning all properties for URLs…", "info");
        scanForUrls(layerData, "layerData");

        // ── Try multiple known HLS URL patterns for ArcGIS Video Server ──
        var hlsUrl = null;
        var candidates = [
          baseUrl + "/0/stream.m3u8?token=" + currentToken,
          baseUrl + "/0/hls/master.m3u8?token=" + currentToken,
          baseUrl + "/0/hls/stream.m3u8?token=" + currentToken,
          baseUrl + "/0/media/stream.m3u8?token=" + currentToken,
          baseUrl + "/0/player?token=" + currentToken,
          baseUrl + "/0/content/stream.m3u8?token=" + currentToken,
        ];

        // Also try the connection endpoint that returns JSON with HLS info
        log("Trying /0/connection endpoint…", "info");
        try {
          var connResp = await fetch(baseUrl + "/0/connection?f=json&token=" + currentToken);
          var connText = await connResp.text();
          log("Connection response (" + connResp.status + "): " + connText.substring(0, 300), "info");
          try {
            var connData = JSON.parse(connText);
            if (connData.hlsUrl) candidates.unshift(connData.hlsUrl);
            if (connData.url) candidates.unshift(connData.url);
            if (connData.streamUrl) candidates.unshift(connData.streamUrl);
            scanForUrls(connData, "connData");
          } catch(e) {}
        } catch (e) {
          log("Connection endpoint: " + e.message, "warn");
        }

        // Try /0/hlsStream
        log("Trying /0/hlsStream endpoint…", "info");
        try {
          var hlsResp = await fetch(baseUrl + "/0/hlsStream?f=json&token=" + currentToken);
          var hlsText = await hlsResp.text();
          log("hlsStream response (" + hlsResp.status + "): " + hlsText.substring(0, 300), "info");
          try {
            var hlsData = JSON.parse(hlsText);
            if (hlsData.url) candidates.unshift(hlsData.url);
            if (hlsData.hlsUrl) candidates.unshift(hlsData.hlsUrl);
            scanForUrls(hlsData, "hlsData");
          } catch(e) {}
        } catch (e) {
          log("hlsStream endpoint: " + e.message, "warn");
        }

        // Probe each candidate URL with a HEAD request
        log("Probing " + candidates.length + " candidate HLS URLs…", "info");
        for (var i = 0; i < candidates.length; i++) {
          var url = candidates[i];
          // Ensure token is a string
          if (typeof url !== "string") continue;

          try {
            log("  Probing: " + url.split("?")[0], "info");
            var probeResp = await fetch(url, { method: "HEAD" });
            log("    Status: " + probeResp.status + " | Content-Type: " + (probeResp.headers.get("content-type") || "none"), "info");

            if (probeResp.ok || probeResp.status === 200) {
              var ct = probeResp.headers.get("content-type") || "";
              if (ct.indexOf("mpegurl") > -1 || ct.indexOf("mp2t") > -1 || ct.indexOf("octet-stream") > -1 || ct.indexOf("video") > -1 || url.indexOf(".m3u8") > -1) {
                hlsUrl = url;
                log("  Found working HLS URL!", "ok");
                break;
              }
              // Even if content-type doesn't match, try it if status is 200
              if (!hlsUrl) {
                hlsUrl = url;
                log("  200 OK — will try this URL", "ok");
              }
            }
          } catch (e) {
            log("    Probe error: " + e.message, "warn");
          }
        }

        if (hlsUrl) {
          log("Playing: " + hlsUrl, "ok");
          playHls(hlsUrl);
        } else {
          log("No working HLS URL found. All candidates returned errors.", "err");
          log("The livestream may need to be accessed via the JS SDK VideoLayer.", "warn");
        }

      } catch (err) {
        log("loadFeed error: " + err.message, "err");
      }
    }

    function scanForUrls(obj, prefix) {
      if (!obj || typeof obj !== "object") return;
      for (var key in obj) {
        var val = obj[key];
        if (typeof val === "string" && (val.indexOf("http") === 0 || val.indexOf("/") === 0)) {
          log("  " + prefix + "." + key + " = " + val, "info");
        } else if (typeof val === "object" && val !== null) {
          scanForUrls(val, prefix + "." + key);
        }
      }
    }

    function playHls(url) {
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }

      if (Hls.isSupported()) {
        var hls = new Hls({
          debug: false,
          enableWorker: true,
          xhrSetup: function (xhr, reqUrl) {
            if (reqUrl.indexOf("token=") === -1 && currentToken) {
              var sep = reqUrl.indexOf("?") > -1 ? "&" : "?";
              xhr.open("GET", reqUrl + sep + "token=" + currentToken, true);
            }
          }
        });

        hls.loadSource(url);
        hls.attachMedia(videoEl);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          log("HLS manifest parsed — playing!", "ok");
          videoEl.play().catch(function (e) {
            log("Autoplay blocked: " + e.message, "warn");
          });
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          log("HLS error: " + data.type + " / " + data.details, "err");
        });

        currentHls = hls;

      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        videoEl.src = url;
        videoEl.addEventListener("loadedmetadata", function () { videoEl.play(); });
      } else {
        log("HLS not supported in this browser", "err");
      }
    }

    // Feed switching
    document.querySelectorAll(".feed-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var key = this.getAttribute("data-feed");
        if (key === activeFeed) return;
        activeFeed = key;
        document.querySelectorAll(".feed-btn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-feed") === key);
        });
        loadFeed(key);
      });
    });
  </script>

</body>
</html>
